version: '3.8'

services:
  ryfty_web:
    build: .
    container_name: ryfty_server_web
    command: gunicorn app:app --workers 1 --threads 2 --timeout 0 --worker-class gevent --bind 0.0.0.0:5000

    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - ryfty_redis

  ryfty_celery_worker:
    build: .
    container_name: ryfty_server_celery_worker
    command: celery -A app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - ryfty_redis

  # ryfty_celery_beat:
  #   build: .
  #   container_name: ryfty_server_celery_beat
  #   command: celery -A app.celery beat --loglevel=info
  #   env_file:
  #     - .env
  #   depends_on:
  #     - ryfty_redis

  ryfty_redis:
    image: redis:7
    container_name: ryfty_server_redis
    ports:
      - "6379:6379"
